{% extends 'base/base.html' %}

{% block title %}Entrar - Base Nacional de Jovens{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-box-arrow-in-right text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3">Entrar</h2>
                        <p class="text-muted">Acede à tua conta</p>
                    </div>
                    
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Telemóvel ou Email</label>
                            <input type="text" name="username" id="id_username" 
                                   class="form-control" placeholder="Teu telemóvel ou email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Palavra-passe</label>
                            <div class="input-group">
                                <input type="password" name="password" id="id_password" 
                                       class="form-control" placeholder="Tua palavra-passe" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" name="remember_me" id="id_remember_me" 
                                   class="form-check-input">
                            <label for="id_remember_me" class="form-check-label">Lembrar-me</label>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="mb-2">
                            <a href="{% url 'accounts:password_reset_request' %}" class="text-decoration-none">
                                <i class="bi bi-key me-1"></i>Esqueceste-te da palavra-passe?
                            </a>
                        </p>
                        <hr>
                        <p class="mb-0">
                            Ainda não tens conta? 
                            <a href="{% url 'accounts:register' %}" class="text-primary fw-semibold">Regista-te</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('id_password');
    const icon = this.querySelector('i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
});
</script>
{% endblock %}
