{% extends 'base/base.html' %}

{% block title %}Editar Perfil da Empresa{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-body">
          <h4>Editar Perfil</h4>
          <form method="post" novalidate enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              {% if company.logo %}
                <label class="form-label">Logo atual</label>
                <div class="mb-2">
                  <img src="{{ company.logo.url }}" alt="Logo" style="max-width:120px;max-height:120px;border-radius:6px;">
                </div>
              {% endif %}
              <label class="form-label">Logo (opcional)</label>
              {{ form.logo }}
            </div>

            {{ form.non_field_errors }}
            {{ form.as_p }}
            <div class="text-end">
              <button class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
